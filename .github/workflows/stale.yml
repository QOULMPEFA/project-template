name: "Close stale issues and PRs"

on:
  schedule:
    - cron: "37 3 * * *" # 3:37 AM daily

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 45
          days-before-pr-close: 7

          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been marked as stale due to 60 days of inactivity.
            It will be closed in 14 days if no further activity occurs.

          stale-pr-label: "stale"
          stale-pr-message: >
            This PR has been marked as stale due to 45 days of inactivity.
            It will be closed in 7 days if no further activity occurs.

          close-issue-message: "Closed due to inactivity."
          close-pr-message: "Closed due to inactivity."

          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned,security"
